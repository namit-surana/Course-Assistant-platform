services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: coursework
      POSTGRES_USER: coursework
      POSTGRES_PASSWORD: coursework
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coursework -d coursework"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build: .
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://coursework:coursework@db:5432/coursework}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # For Docker, prefer real AWS credentials via env vars (not AWS_PROFILE).
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL}
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://coursework:coursework@db:5432/coursework}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL}
      WORKER_ENABLE_PPT_ANALYSIS: ${WORKER_ENABLE_PPT_ANALYSIS:-true}
      WORKER_ENABLE_REPOSITORY_ANALYSIS: ${WORKER_ENABLE_REPOSITORY_ANALYSIS:-true}
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:

