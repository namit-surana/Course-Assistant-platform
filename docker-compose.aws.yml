services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: coursework
      POSTGRES_USER: coursework
      POSTGRES_PASSWORD: coursework
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coursework -d coursework"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build: .
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://coursework:coursework@db:5432/coursework}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # For Docker, prefer real AWS credentials via env vars (not AWS_PROFILE).
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL}
      SQS_QUEUE_URL_GIT: ${SQS_QUEUE_URL_GIT}
      SQS_QUEUE_URL_PPT: ${SQS_QUEUE_URL_PPT}
      SQS_QUEUE_URL_VIDEO: ${SQS_QUEUE_URL_VIDEO}
      SQS_QUEUE_URL_SUBMISSION: ${SQS_QUEUE_URL_SUBMISSION}
      SQS_QUEUE_URL_FINAL_GRADING: ${SQS_QUEUE_URL_FINAL_GRADING}
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy

  worker_git:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://coursework:coursework@db:5432/coursework}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      SQS_QUEUE_URL_GIT: ${SQS_QUEUE_URL_GIT}
      WORKER_JOB_TYPE: git_analysis
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy

  worker_ppt:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://coursework:coursework@db:5432/coursework}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      SQS_QUEUE_URL_PPT: ${SQS_QUEUE_URL_PPT}
      WORKER_JOB_TYPE: ppt_analysis
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy

  worker_video:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://coursework:coursework@db:5432/coursework}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      SQS_QUEUE_URL_VIDEO: ${SQS_QUEUE_URL_VIDEO}
      WORKER_JOB_TYPE: video_analysis
      WORKER_ENABLE_VIDEO_ANALYSIS: ${WORKER_ENABLE_VIDEO_ANALYSIS:-true}
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy

  worker_final_grader:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://coursework:coursework@db:5432/coursework}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      SQS_QUEUE_URL_FINAL_GRADING: ${SQS_QUEUE_URL_FINAL_GRADING}
      WORKER_JOB_TYPE: final_grading_analysis
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:

