integration_security_task:
  agent: integration_security_agent
  tools:
    - fetch_repo_file_preview
  expected_output: |
    {
      "applicable": true,
      "summary": "...",
      "runtime_behavior": ["..."],
      "architecture_patterns": ["..."],
      "risks": ["..."],
      "strengths": ["..."],
      "intelligent_questions": ["..."],
      "evidence_paths": ["..."]
    }
  description: |
    Objective:
    Analyze integrations, configuration surfaces, security-sensitive boundaries, and operational risk.

    Rules:
    - Use the provided specialist analysis input as the complete working context for this task.
    - If assigned_paths is empty, return applicable=false with a brief summary and empty lists.
    - If applicable, inspect assigned_paths with the preview tool before reasoning.
    - Start with the first chunk of an assigned file.
    - If the first chunk is mostly imports, setup, boilerplate, or otherwise inconclusive, call the preview tool again with a higher start_line to inspect the next chunk.
    - Do not request the same chunk twice for the same file.
    - Inspect the smallest evidence set that can answer the task confidently.
    - Stop requesting more chunks as soon as the file's role is clear.
    - Once a file's role is clear, move to the next uninspected assigned path instead of rereading it.
    - Revisit a file only for a specific unresolved question and then request a different line range.
    - Prioritize files that expose callback, secret, network, storage, deployment, or provider boundaries before broad hardening advice.
    - Prefer this file order when available: env/config files first, integration/provider modules second, deployment/runtime config third, documentation last.
    - Inspect at most 4 distinct assigned files unless a specific unresolved question remains.
    - Inspect at most 2 chunks per file unless a later chunk is required to resolve a concrete question.
    - Avoid unnecessary extra chunk fetches.
    - Focus on third-party dependencies, secrets/config handling, auth-sensitive boundaries, provider integrations, and cloud/service edges.
    - Be concise. Keep summary under 140 words.
    - Return at most 5 runtime_behavior items, 4 architecture_patterns, 6 risks, 4 strengths, and 5 intelligent_questions.
    - Do not repeat the repo overview, intake summary, or broad generic security advice that is not grounded in assigned evidence.
    - Do not perform a full security audit. Report only the highest-confidence integration and security boundary findings supported by inspected evidence.

    Specialist analysis input:
    {specialist_input_json}

