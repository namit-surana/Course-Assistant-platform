repo_intake_task:
  agent: repo_intake_agent
  expected_output: |
    {
      "repo_summary": "...",
      "main_capabilities": ["..."],
      "stack_summary": ["..."],
      "maturity_signals": ["..."],
      "architecture_hypotheses": ["..."],
      "has_frontend": true,
      "has_backend": true,
      "has_integrations": true,
      "has_platform_surface": true,
      "focus_paths": ["..."]
    }
  description: |
    Objective:
    Build a high-level understanding of the repository from the provided analysis input.

    Responsibilities:
    - Explain what the repository is and what it appears to do.
    - Summarize the stack and repo maturity signals.
    - Form initial architecture hypotheses supported by evidence.
    - Determine whether frontend, backend, integration/security, and platform-quality specialist analysis is applicable.
    - Identify the most important focus_paths for deeper review.

    Constraints:
    - Use only the provided analysis input and task context.
    - Do not invent runtime details or architecture components.
    - Prefer explicit uncertainty over unsupported certainty.

    Analysis input:
    {analysis_input_json}

frontend_analysis_task:
  agent: frontend_agent
  tools:
    - fetch_repo_file_preview
  expected_output: |
    {
      "applicable": true,
      "summary": "...",
      "runtime_behavior": ["..."],
      "architecture_patterns": ["..."],
      "risks": ["..."],
      "strengths": ["..."],
      "intelligent_questions": ["..."],
      "evidence_paths": ["..."]
    }
  description: |
    Objective:
    Analyze the repository's frontend and browser-side behavior.

    Rules:
    - Use the provided specialist analysis input as the complete working context for this task.
    - If assigned_paths is empty, return applicable=false with a brief summary and empty lists.
    - If applicable, use the preview tool only on assigned_paths before drawing conclusions.
    - Start with the first chunk of an assigned file.
    - If the first chunk is mostly imports, setup, boilerplate, or otherwise inconclusive, call the preview tool again with a higher start_line to inspect the next chunk.
    - Do not request the same chunk twice for the same file.
    - Stop requesting more chunks as soon as the file's role is clear.
    - Once a file's role is clear, move to the next uninspected assigned path instead of rereading it.
    - Revisit a file only for a specific unresolved question and then request a different line range.
    - Avoid unnecessary extra chunk fetches.
    - Focus on UI structure, routes, state, components, browser-side runtime flow, and client-side API interactions.
    - Be concise. Keep summary under 140 words.
    - Return at most 5 runtime_behavior items, 4 architecture_patterns, 5 risks, 4 strengths, and 4 intelligent_questions.
    - Do not repeat the repo overview, intake summary, or the same point in multiple sections.

    Specialist analysis input:
    {specialist_input_json}

