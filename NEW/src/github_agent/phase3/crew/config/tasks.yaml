final_report_task:
  agent: repo_intake_agent
  expected_output: |
    {
      "report_title": "...",
      "executive_summary": "...",
      "repository_overview": "...",
      "component_summary": ["..."],
      "runtime_behavior": ["..."],
      "architecture_patterns": ["..."],
      "risks_and_weaknesses": ["..."],
      "quality_assessment": "...",
      "strengths": ["..."],
      "intelligent_questions": ["..."],
      "recommended_next_steps": ["..."],
      "evidence_paths": ["..."]
    }
  description: |
    Objective:
    Synthesize the intake and specialist analyses into one clean, professional final repository assessment.

    Requirements:
    - Summarize what the system is, how it appears to work at runtime, and which architecture patterns are present.
    - Evaluate quality and highlight the strongest parts of the system.
    - Detect and summarize the most meaningful risks and weaknesses.
    - Generate intelligent follow-up questions that would help reduce uncertainty.
    - Base every conclusion on the provided analysis input and prior task context.

    Analysis input:
    {analysis_input_json}

    Repo Intake output:
    {repo_intake_json}

    Frontend review summary:
    {frontend_summary_json}

    Backend review summary:
    {backend_summary_json}

    Integration and security review summary:
    {integration_security_summary_json}

    Platform quality review summary:
    {platform_quality_summary_json}
